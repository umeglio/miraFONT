document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

rflow:hidden;margin-top:1px\"><div class=\"mira-lake\">{{ heroMirror }}<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"margin-top:18px;max-width:780px;font-size:15px;line-height:1.7;color:#bcd3f0\">\n        The native display face of the miraNET <strong style=\"color:#2fd0ff;font-weight:600\">Digital Runtime<\u002Fstrong>. A 5×7 node matrix, compiled parametrically from one source — <strong style=\"color:#d6ecff\">monospaced and uniform, proportioned like Consolas<\u002Fstrong>. Two cuts share the grid: the dotted matrix, and a merged <strong style=\"color:#d6ecff\">Linear<\u002Fstrong> stroke for crisp small text.\n      <\u002Fdiv>\n      <div style=\"margin-top:14px;font-family:'Space Mono',monospace;font-size:12px;color:#6a82ab\">// where data speaks C — Umberto Meglio, Naples 2026<\u002Fdiv>\n    <\u002Fsection>\n\n    <section style=\"border:1px solid rgba(47,208,255,.28);background:rgba(47,208,255,.045);border-radius:10px;padding:22px 24px;margin:6px 0 46px\">\n      <div style=\"font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.2em;color:#2fd0ff;margin-bottom:13px\">▸ ROUND 4 — FULL FONT FAMILY, SHIPPED<\u002Fdiv>\n      <div style=\"font-size:13px;line-height:1.8;color:#bcd3f0\">\n        Every cut now exports as <strong style=\"color:#d6ecff\">.otf + .ttf + .woff2 + .woff<\u002Fstrong> with a ready <span style=\"color:#2fd0ff\">miraFONT.css<\u002Fspan>. The <strong style=\"color:#d6ecff\">Linear<\u002Fstrong> version is built with a true <strong style=\"color:#d6ecff\">boolean-union<\u002Fstrong> — one merged contour per stroke (clean counters, hint-ready at small sizes). Proportions are Consolas-tight and uniform; nodes are dense so light themes read solid black (<span style=\"color:#2fd0ff\">08<\u002Fspan>).\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <section style=\"margin-bottom:54px\">\n      <div style=\"font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.24em;color:#2fd0ff;margin-bottom:8px\">02 / COM :'Space Mono',monospace;font-size:10.5px;letter-spacing:.14em;color:#6a82ab;margin:26px 0 11px\">PUNCTUATION &amp; SYMBOLS<\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(60px,1fr));gap:9px\">\n        <sc-for list=\"{{ glyphsPunct }}\" as=\"g\" hint-placeholder-count=\"28\">\n          <div style=\"background:#081026;border:1px solid rgba(47,208,255,.1);border-radius:7px;aspect-ratio:1/1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;padding:8px\"><div style=\"flex:1;display:flex;align-items:center;justify-content:center\">{{ g.svg }}<\u002Fdiv><div style=\"font-family:'Space Mono',monospace;font-size:10px;color:#6a82ab\">{{ g.label }}<\u002Fdiv><\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <section style=\"margin-bottom:54px\">\n      <div style=\"font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.24em;color:#2fd0ff;margin-bottom:8px\">06 / IN USE<\u002Fdiv>\n      <div style=\"font-size:16px;margin-bottom:24px;font-weight:500\" class=\"mf\">On the runtime.<\u002Fdiv>\n      <div style=\"border:1px solid rgba(47,208,255,.14);border-radius:11px;background:#060d20;overflow:hidden;margin-bottom:18px\">\n        <div style=\"display:flex;gap:7px;align-items:center;padding:12px 16px;border-bottom:1px solid rgba(47,208,255,.12)\">\n          <span style=\"width:9px;height:9px;border-radius:50%;background:#ff5f57\"><\u002Fspan>\n          <span style=\"width:9px;height:9px;border-radius:50%;background:#febc2e\"><\u002Fspan>\n          <span style=\"width:9px;height:9px;border-radius:50%;background:#28c840\"><\u002Fspan>\n          <span style=\"font-family:'Space Mono',monospace;font-size:11px;color:#6a82ab;margin-left:10px\">mira://runtime — dispatcher<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"padding:20px 22px;display:flex;flex-direction:column;gap:11px;overflow-x:auto\">\n          <sc-for list=\"{{ termLines }}\" as=\"t\" hint-placeholder-count=\"5\">{{ t.svg }}<\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:1.2fr 1fr;gap:18px\">\n        <div style=\"background:#081026;border:1px solid rgba(47,208,255,.14);border-radius:11px;padding:20px 22px\">\n          <div style=\"font-family:'Space Mono',monospace;font-size:10.5px;letter-spacing:.14em;color:#6a82ab;margin-bottom:16px\">MODULE LABELS<\u002Fdiv>\n          <div style=\"display:flex;gap:11px;flex-wrap:wrap\">\n            <sc-for list=\"{{ chipItems }}\" as=\"c\" hint-placeholder-count=\"6\">\n              <div style=\"border:1px solid rgba(47,208,255,.32);background:rgba(47,208,255,.07);border-radius:6px;padding:9px 13px;display:flex;align-items:center\">{{ c.svg }}<\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#081026;border:1px solid rgba(47,208,255,.14);border-radius:11px;padding:20px 22px\">\n          <div style=\"font-family:'Space Mono',monospace;font-size:10.5px;letter-spacing:.14em;color:#6a82ab;margin-bottom:16px\">DATA READOUT<\u002Fdiv>\n          <div style=\"display:flex;gap:30px;flex-wrap:wrap\">\n            <sc-for list=\"{{ numItems }}\" as=\"n\" hint-placeholder-count=\"3\">\n              <div style=\"display:flex;flex-direction:column;gap:8px\"><div>{{ n.svg }}<\u002Fdiv><div style=\"font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.12em;color:#6a82ab\">{{ n.label }}<\u002Fdiv><\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <section style=\"margin-bottom:54px\">\n      <div style=\"font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.24em;color:#2fd0ff;margin-bottom:8px\">07 / NODE TEXTURES<\u002Fdiv>\n      <div style=\"font-size:16px;margin-bottom:22px;font-weight:500\" class=\"mf\">Same glyphs, different node. <span style=\"color:#6a82ab;font-weight:400\">Dots and Linear are the two you export.<\u002Fspan><\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(224px,1fr));gap:14px\">\n        <sc-for list=\"{{ textureSamples }}\" as=\"x\" hint-placeholder-count=\"4\">\n          <div style=\"border:1px solid rgba(47,208,255,.14);border-radius:11px;background:#081026;padding:22px;display:flex;flex-direction:column;gap:15px;align-items:center\">\n            <div style=\"min-height:62px;display:flex;align-items:center\">{{ x.svg }}<\u002Fdiv>\n            <div style=\"font-family:'Space Mono',monospace;font-size:10.5px;letter-spacing:.14em;color:#6a82ab\">{{ x.label }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <section style=\"margin-bottom:54px\">\n      <div style=\"font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.24em;color:#2fd0ff;margin-bottom:8px\">08 / ON LIGHT<\u002Fdiv>\n      <div style=\"font-size:16px;margin-bottom:6px;font-weight:500\" class=\"mf\">Black on light. <span style=\"color:#6a82ab;font-weight:400\">Denser nodes read solid — not faint grey — on light Windows themes.<\u002Fspan><\u002Fdiv>\n      <div style=\"margin-top:22px;background:#f4f7fb;border:1px solid rgba(47,208,255,.2);border-radius:12px;padding:30px 30px 26px\">\n        <div style=\"display:flex;flex-direction:column;gap:24px\">\n          <div style=\"display:flex;align-items:center;gap:22px;flex-wrap:wrap\">\n            <span style=\"flex:0 0 64px;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.14em;color:#5b7290\">DOTS<\u002Fspan>\n            <div style=\"overflow-x:auto\">{{ lightDots }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"height:1px;background:#dce4ee\"><\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:22px;flex-wrap:wrap\">\n            <span style=\"flex:0 0 64px;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.14em;color:#5b7290\">LINEAR<\u002Fspan>\n            <div style=\"overflow-x:auto\">{{ lightLinear }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:22px;font-family:'Space Mono',monospace;font-size:11px;color:#5b7290\">// the font carries no colour — it takes the text colour. On light UI, set it #0b1018 and it's pure black.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <section style=\"margin-bottom:54px\">\n      <div style=\"font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.24em;color:#2fd0ff;margin-bottom:8px\">09 / LAKE REFLECTION<\u002Fdiv>\n      <div style=\"font-size:16px;margin-bottom:6px;font-weight:500\" class=\"mf\">Like water. <span style=\"color:#6a82ab;font-weight:400\">Mirrored at ⅓ height, softened and faded — a reusable feature.<\u002Fspan><\u002Fdiv>\n      <div style=\"margin-top:22px;border:1px solid rgba(47,208,255,.16);border-radius:14px;background:linear-gradient(180deg,#0a1838 0%,#050b1e 100%);padding:54px 30px 26px;display:flex;flex-direction:column;align-items:center;overflow:hidden;position:relative\">\n        <div style=\"position:absolute;top:0;left:0;right:0;height:140px;background:radial-gradient(58% 100% at 50% 0,rgba(47,208,255,.2),transparent);pointer-events:none\"><\u002Fdiv>\n        <div style=\"position:relative;z-index:1\">{{ reflectMain }}<\u002Fdiv>\n        <div style=\"height:74px;overflow:hidden;width:100%;text-align:center\"><div class=\"mira-lake\">{{ reflectMirror }}<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"margin-top:16px;background:#081026;border:1px solid rgba(47,208,255,.14);border-radius:10px;padding:18px 20px\">\n        <div style=\"font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.14em;color:#6a82ab;margin-bottom:10px\">CSS RECIPE — the lake feature<\u002Fdiv>\n        <pre style=\"font-size:11px;line-height:1.6;color:#9ab4d6;white-space:pre-wrap\">.mira-lake{                                  /* a duplicate of the text */\n  transform:scaleY(-0.34) translateY(-100%); /* mirror + squash to 1/3  */\n  display:inline-block; transform-origin:top; opacity:.6; filter:blur(.35px);\n  -webkit-mask-image:linear-gradient(to top,#000,transparent 74%);\n          mask-image:linear-gradient(to top,#000,transparent 74%);\n}\n.mira-shine{ background:linear-gradient(#a8ecff,#2fd0ff);\n  -webkit-background-clip:text; background-clip:text; color:transparent; }<\u002Fpre>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <section style=\"margin-bottom:50px\">\n      <div style=\"font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.24em;color:#2fd0ff;margin-bottom:8px\">10 / HYPERLINKS<\u002Fdiv>\n      <div style=\"font-size:16px;margin-bottom:6px;font-weight:500\" class=\"mf\">Make links signal. <span style=\"color:#6a82ab;font-weight:400\">Three treatments — the runtime default is the glow underline.<\u002Fspan><\u002Fdiv>\n      <div style=\"margin-top:22px;background:#081026;border:1px solid rgba(47,208,255,.14);border-radius:11px;padding:24px 26px\">\n        <p style=\"font-size:15.5px;line-height:2.1;color:#bcd3f0;margin:0 0 22px;max-width:680px\">\n          The dispatcher routes through <a class=\"mn-link\" href=\"#top\">native completion ports<\u002Fa>, where <a class=\"mn-link\" href=\"#top\">data speaks C<\u002Fa> — open the <a class=\"mn-link\" href=\"#top\">miraGRID engine<\u002Fa> for tabular output, or the <a class=\"mn-link\" href=\"#top\">miraAGENT bridge<\u002Fa> to drive deployment.\n        <\u002Fp>\n        <div style=\"display:flex;gap:34px;flex-wrap:wrap;align-items:center;padding-top:20px;border-top:1px solid rgba(47,208,255,.1)\">\n          <div style=\"display:flex;flex-direction:column;gap:11px\"><span style=\"font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.13em;color:#6a82ab\">GLOW UNDERLINE · default<\u002Fspan><a class=\"mn-link\" href=\"#top\" style=\"font-size:18px\">miraNET runtime<\u002Fa><\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:11px\"><span style=\"font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.13em;color:#6a82ab\">BRACKETED · code/cli<\u002Fspan><a class=\"mn-link-b\" href=\"#top\" style=\"font-size:17px\">[miraNET runtime]<\u002Fa><\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:11px\"><span style=\"font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.13em;color:#6a82ab\">TAGGED · nav/list<\u002Fspan><a class=\"mn-link-t\" href=\"#top\" style=\"font-size:18px\">miraNET runtime<\u002Fa><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:22px;font-family:'Space Mono',monospace;font-size:12px;color:#6a82ab\">contatto: <a class=\"mn-link\" href=\"mailto:umberto.meglio@libero.it\">umberto.meglio@libero.it<\u002Fa><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <svg width=\"0\" height=\"0\" style=\"position:absolute;pointer-events:none\" aria-hidden=\"true\"><defs>\n      <linearGradient id=\"foxg\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\"><stop offset=\"0\" stop-color=\"#a8ecff\"><\u002Fstop><stop offset=\"1\" stop-color=\"#1e7bff\"><\u002Fstop><\u002FlinearGradient>\n      <symbol id=\"foxsym\" viewBox=\"0 0 100 100\">\n        <polygon points=\"50,94 73,67 86,56 73,48 79,9 53,34 50,38 47,34 21,9 27,48 14,56 27,67\" fill=\"rgba(47,208,255,.07)\" stroke=\"url(#foxg)\" stroke-width=\"2.6\" stroke-linejoin=\"round\"><\u002Fpolygon>\n        <polygon points=\"28,17 45,34 36,33\" fill=\"rgba(47,208,255,.30)\"><\u002Fpolygon>\n        <polygon points=\"72,17 55,34 64,33\" fill=\"rgba(47,208,255,.30)\"><\u002Fpolygon>\n        <polyline points=\"25,61 33,33 50,54 67,33 75,61\" fill=\"none\" stroke=\"url(#foxg)\" stroke-width=\"7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpolyline>\n        <polygon points=\"32,46 45,51 33,56\" fill=\"#bff0ff\" class=\"mn-eye\"><\u002Fpolygon>\n        <polygon points=\"68,46 55,51 67,56\" fill=\"#bff0ff\" class=\"mn-eye\"><\u002Fpolygon>\n        <polygon points=\"50,62 55,67 50,73 45,67\" fill=\"#2fd0ff\"><\u002Fpolygon>\n      <\u002Fsymbol>\n    <\u002Fdefs><\u002Fsvg>\n\n    <section style=\"margin-bottom:54px\">\n      <div style=\"font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.24em;color:#2fd0ff;margin-bottom:8px\">11 / FOX MARK<\u002Fdiv>\n      <div class=\"mf\" style=\"font-size:16px;margin-bottom:6px;font-weight:500\">A fox for the runtime. <span style=\"color:#6a82ab;font-weight:400\">— an original mark, a nod to Visual FoxPro, rebuilt as miraNET circuitry.<\u002Fspan><\u002Fdiv>\n      <div style=\"margin-top:22px;display:grid;grid-template-columns:auto 1fr;gap:18px;align-items:stretch\">\n        <div style=\"width:200px;height:200px;border:1px solid rgba(47,208,255,.16);border-radius:14px;background:radial-gradient(circle at 50% 38%,#0c2150,#050b1e);display:flex;align-items:center;justify-content:center;padding:12px\">\n          <dc-import name=\"FoxLogo\" style=\"width:176px;height:176px\" hint-size=\"176px,176px\"><\u002Fdc-import>\n        <\u002Fdiv>\n        <div style=\"border:1px solid rgba(47,208,255,.14);border-radius:14px;background:#081026;padding:24px;display:flex;flex-direction:column;justify-content:center;gap:18px\">\n          <div style=\"display:flex;align-items:center;gap:16px\">\n            <svg viewBox=\"0 0 100 100\" width=\"48\" height=\"48\" style=\"overflow:visible;display:block;filter:drop-shadow(0 0 8px rgba(47,208,255,.45))\"><use href=\"#foxsym\"><\u002Fuse><\u002Fsvg>\n            <div class=\"mf\" style=\"font-size:30px;color:#d6ecff;text-shadow:0 0 14px rgba(47,208,255,.45)\">miraNET<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"font-size:13px;line-height:1.7;color:#8fb6e0;max-width:460px\">A low-poly fox cut from the same cyan circuitry as the runtime — angular facets, glowing eyes, one accent gradient. Original artwork: it only <em style=\"color:#bcd3f0\">evokes<\u002Fem> the Visual FoxPro fox, it doesn't copy it. <strong style=\"color:#2fd0ff\">Hover the mark<\u002Fstrong> — it highlights and animates. It's a reusable component (<span style=\"font-family:'Space Mono',monospace;font-size:11.5px\">FoxLogo<\u002Fspan>).<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <section style=\"margin-bottom:54px\">\n      <div style=\"font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.24em;color:#2fd0ff;margin-bottom:8px\">12 / miraNET · ASCII<\u002Fdiv>\n      <div class=\"mf\" style=\"font-size:16px;margin-bottom:6px;font-weight:500\">Drawn from the matrix. <span style=\"color:#6a82ab;font-weight:400\">— miraNET spelled in miraFONT's own 5×7 nodes.<\u002Fspan><\u002Fdiv>\n      <div style=\"margin-top:22px;border:1px solid rgba(47,208,255,.14);border-radius:11px;background:#060d20;overflow:hidden\">\n        <div style=\"display:flex;gap:7px;align-items:center;padding:12px 16px;border-bottom:1px solid rgba(47,208,255,.12)\">\n          <span style=\"width:9px;height:9px;border-radius:50%;background:#ff5f57\"><\u002Fspan><span style=\"width:9px;height:9px;border-radius:50%;background:#febc2e\"><\u002Fspan><span style=\"width:9px;height:9px;border-radius:50%;background:#28c840\"><\u002Fspan>\n          <span style=\"font-family:'Space Mono',monospace;font-size:11px;color:#6a82ab;margin-left:10px\">mira://ascii — banner<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"padding:24px;overflow-x:auto\"><pre style=\"font-family:'miraFONT','Space Mono',ui-monospace,monospace;font-size:13px;line-height:1.0;letter-spacing:0;color:#2fd0ff;text-shadow:0 0 10px rgba(47,208,255,.5);white-space:pre;margin:0\">{{ asciiNet }}<\u002Fpre><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <section style=\"margin-bottom:54px\">\n      <div style=\"font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.24em;color:#2fd0ff;margin-bottom:8px\">13 / WAIT WINDOWS<\u002Fdiv>\n      <div class=\"mf\" style=\"font-size:16px;margin-bottom:6px;font-weight:500\">Loops for the wait. <span style=\"color:#6a82ab;font-weight:400\">— drop-in loaders &amp; info toasts with the fox + logo. Continuous.<\u002Fspan><\u002Fdiv>\n      <div style=\"margin-top:24px;display:flex;gap:26px;flex-wrap:wrap;align-items:flex-start\">\n        <div style=\"display:flex;flex-direction:column;gap:10px\">\n          <div style=\"width:360px;max-width:100%;border:1px solid rgba(47,208,255,.2);border-radius:12px;background:#070e22;overflow:hidden;--mn-d:5s\">\n            <div style=\"display:flex;gap:7px;align-items:center;padding:11px 15px;border-bottom:1px solid rgba(47,208,255,.12)\">\n              <span style=\"width:9px;height:9px;border-radius:50%;background:#ff5f57\"><\u002Fspan><span style=\"width:9px;height:9px;border-radius:50%;background:#febc2e\"><\u002Fspan><span style=\"width:9px;height:9px;border-radius:50%;background:#28c840\"><\u002Fspan>\n              <span style=\"font-family:'Space Mono',monospace;font-size:11px;color:#6a82ab;margin-left:10px\">miraNET — please wait<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"position:relative;padding:30px 24px 24px;display:flex;flex-direction:column;align-items:center;gap:16px\">\n              <div style=\"position:relative;width:150px;height:150px;display:flex;align-items:center;justify-content:center\">\n                <div class=\"mn-ring\" style=\"position:absolute;inset:0;border-radius:50%;background:conic-gradient(from 0deg,transparent 0 60%,#2fd0ff 80%,#a8ecff 92%,transparent 100%);-webkit-mask:radial-gradient(farthest-side,transparent calc(100% - 3px),#000 calc(100% - 2px));mask:radial-gradient(farthest-side,transparent calc(100% - 3px),#000 calc(100% - 2px))\"><\u002Fdiv>\n                <div class=\"mn-breathe\" style=\"filter:drop-shadow(0 0 12px rgba(47,208,255,.55))\"><div class=\"mn-pulse\"><svg viewBox=\"0 0 100 100\" width=\"92\" height=\"92\" style=\"overflow:visible;display:block\"><use href=\"#foxsym\"><\u002Fuse><\u002Fsvg><\u002Fdiv><\u002Fdiv>\n                <div cl 208,255,.5))\"><svg viewBox=\"0 0 100 100\" width=\"34\" height=\"34\" style=\"overflow:visible;display:block\"><use href=\"#foxsym\"><\u002Fuse><\u002Fsvg><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"flex:1;min-width:0\">\n              <div class=\"mf\" style=\"font-size:15px;color:#d6ecff\">miraNET<\u002Fdiv>\n              <div class=\"mf\" style=\"font-size:11px;color:#7fb0e0;margin-top:3px\">syncing data<span class=\"mn-d1\">.<\u002Fspan><span class=\"mn-d2\">.<\u002Fspan><span class=\"mn-d3\">.<\u002Fspan><\u002Fdiv>\n              <div style=\"margin-top:9px;height:3px;border-radius:3px;background:rgba(47,208,255,.14);overflow:hidden\"><div class=\"mn-prog\" style=\"height:100%;background:linear-gradient(90deg,#1e7bff,#2fd0ff);box-shadow:0 0 8px rgba(47,208,255,.5)\"><\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"font-family:'Space Mono',monospace;font-size:10.5px;letter-spacing:.14em;color:#6a82ab\">● SMALLER · 10s LOOP<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <section style=\"margin-bottom:54px\">\n      <div style=\"font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.24em;color:#2fd0ff;margin-bottom:8px\">14 / ON HARDWARE<\u002Fdiv>\n      <div class=\"mf\" style=\"font-size:16px;margin-bottom:6px;font-weight:500\">SSD1306 128×64 preview. <span style=\"color:#6a82ab;font-weight:400\">— live, pixel-for-pixel what the ESP32-S3 demo paints on the ELEGOO blue/yellow OLED.<\u002Fspan><\u002Fdiv>\n      <div style=\"margin-top:24px;display:flex;gap:28px;flex-wrap:wrap;align-items:flex-start\">\n        <div style=\"display:flex;flex-direction:column;align-items:center;gap:12px\">\n          <div style=\"display:flex;gap:20px;padding:0 4px 2px\">\n            <sc-for list=\"{{ oledPins }}\" as=\"p\" hint-placeholder-count=\"4\">\n              <div style=\"display:flex;flex-direction:column;align-items:center;gap:5px\">\n                <div styl
