# Keeps the gh-pages branch in sync with main.
# GitHub Pages serves the site from the gh-pages branch
# (index.html landing page + miraFONT-specimen.html + fonts/).
name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Sync main to gh-pages
        run: git push --force origin HEAD:gh-pages
