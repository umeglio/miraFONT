document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

box-sizing:border-box}\n  ::selection{background:#2fd0ff;color:#03060f}\n  @keyframes mnblink{0%,48%{opacity:1}49%,100%{opacity:0}}\n  pre{margin:0;font-family:'Space Mono',ui-monospace,monospace}\n  input[type=range]{-webkit-appearance:none;appearance:none;height:3px;background:rgba(47,208,255,.22);border-radius:2px;outline:none}\n  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:15px;height:15px;border-radius:50%;background:#2fd0ff;cursor:pointer;box-shadow:0 0 10px rgba(47,208,255,.8)}\n  input[type=range]::-moz-range-thumb{width:15px;height:15px;border:none;border-radius:50%;background:#2fd0ff;cursor:pointer}\n  ::-webkit-scrollbar{height:9px;width:9px}\n  ::-webkit-scrollbar-track{background:transparent}\n  ::-webkit-scrollbar-thumb{background:rgba(47,208,255,.2);border-radius:9px}\n  .mn-eb:hover{border-color:rgba(47,208,255,.7)!important;background:rgba(47,208,255,.1)!important}\n  .mn-sb:hover{border-color:rgba(47,208,255,.55)!important;color:#d6ecff!important}\n  .mn-link{color:#2fd0ff;text-decoration:none;font-weight:500;position:relative;text-shadow:0 0 8px rgba(47,208,255,.4);transition:color .15s,text-shadow .15s;white-space:nowrap}\n  .mn-link::after{content:\"\";position:absolute;left:0;right:0;bottom:-2px;height:1.5px;background:#2fd0ff;box-shadow:0 0 8px #2fd0ff;transform:scaleX(1);transform-origin:left;transition:box-shadow .15s,transform .2s}\n  .mn-link:hover{color:#a8ecff;text-shadow:0 0 13px rgba(47,208,255,.85)}\n  .mn-link:hover::after{box-shadow:0 0 13px #2fd0ff,0 0 4px #fff}\n  .mn-link-b{color:#2fd0ff;text-decoration:none;font-family:'Space Mono',monospace;font-weight:700;text-shadow:0 0 8px rgba(47,208,255,.4);transition:all .15s}\n  .mn-link-b:hover{color:#a8ecff;text-shadow:0 0 13px rgba(47,208,255,.9);letter-spacing:.02em}\n  .mn-link-t{color:#2fd0ff;text-decoration:none;font-weight:600;transition:all .15s}\n  .mn-link-t::before{content:\"\\203A  \";color:#2fd0ff}\n  .mn-link-t:hover{color:#a8ecff;text-shadow:0 0 12px rgba(47,208,255,.75)}\n  .mira-shine{background:linear-gradient(#a8ecff,#2fd0ff);-webkit-background-clip:text;background-clip:text;color:transparent;filter:drop-shadow(0 0 14px rgba(47,208,255,.5))}\n  .mira-lake{display:inline-block;transform:scaleY(-0.34) translateY(-100%);transform-origin:top;opacity:.6;filter:blur(.35px);-webkit-mask-image:linear-gradient(to top,#000,transparent 74%);mask-image:linear-gradient(to top,#000,transparent 74%)}\n  @keyframes mn-spin{to{transform:rotate(360deg)}}\n  @keyframes mn-breathe{0%,100%{opacity:.5}50%{opacity:1}}\n  @keyframes mn-pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}\n  @keyframes mn-eye{0%,36%,100%{opacity:.28}46%,90%{opacity:1}}\n  @keyframes mn-prog{0%{transform:scaleX(0)}85%{transform:scaleX(1)}100%{transform:scaleX(1)}}\n  @keyframes mn-sweep{0%{top:8%;opacity:0}16%{opacity:.85}84%{opacity:.85}100%{top:82%;opacity:0}}\n  @keyframes mn-dot{0%,15%{opacity:.16}45%{opacity:1}100%{opacity:.16}}\n  .mn-ring{animation:mn-spin var(--mn-d,5s) linear infinite}\n  .mn-breathe{animation:mn-breathe var(--mn-d,5s) ease-in-out infinite}\n  .mn-pulse{animation:mn-pulse var(--mn-d,5s) ease-in-out infinite}\n  .mn-eye{animation:mn-eye var(--mn-d,5s) ease-in-out infinite}\n  .mn-prog{transform-origin:left;animation:mn-prog var(--mn-d,5s) ease-in-out infinite}\n  .mn-sweep{animation:mn-sweep var(--mn-d,5s) ease-in-out infinite}\n  .mn-d1,.mn-d2,.mn-d3{animation:mn-dot 1.4s steps(1,end) infinite}\n  .mn-d2{animation-delay:.23s}\n  .mn-d3{animation-delay:.46s}\n  @media (prefers-reduced-motion:reduce){.mn-ring,.mn-breathe,.mn-pulse,.mn-eye,.mn-prog,.mn-sweep,.mn-d1,.mn-d2,.mn-d3{animation:none!important}}\n  .mf{font-family:'miraFONT','Space Grotesk',system-ui,sans-serif;line-height:1.35;letter-spacing:.005em}\n<\/style>\n<\/helmet>\n<section style=\"position:relative;z-index:5;background:linear-gradient(180deg,#04101f 0%,#03060f 100%);border-bottom:1px solid rgba(47,208,255,.25);padding:26px 20px 22px;color:#d6ecff\">\n  <div style=\"max-width:1080px;margin:0 auto\">\n    <div style=\"display:flex;flex-wrap:wrap;align-items:center;gap:12px\">\n      <span style=\"font-family:'Space Mono',monospace;font-weight:700;font-size:15px;letter-spacing:.08em;color:#03060f;background:#2fd0ff;border-radius:999px;padding:6px 16px\">100% miraFONT<\/span>\n      <span style=\"font-family:'Space Mono',monospace;font-size:14px;color:#8fb6e0\">Tutto questo sito &egrave; composto in miraFONT &mdash; anche questo testo. &middot; This entire site is set in miraFONT &mdash; including this very text.<\/span>\n      <a href=\"https://doi.org/10.5281/zenodo.19402571\" title=\"miraNET on Zenodo\" style=\"display:inline-flex;align-items:center;gap:8px;text-decoration:none;border:1px solid rgba(47,208,255,.4);border-radius:999px;padding:5px 14px\">\n        <span style=\"font-family:'Space Mono',monospace;font-weight:700;font-size:13px;color:#2fd0ff\">miraNET<\/span>\n        <img src=\"https://zenodo.org/badge/DOI/10.5281/zenodo.19402571.svg\" alt=\"DOI 10.5281/zenodo.19402571\" style=\"height:20px;display:block\">\n      <\/a>\n    <\/div>\n    <p style=\"font-family:'Space Mono',monospace;font-size:14px;line-height:1.8;color:#b9d4f0;margin:16px 0 0\">\n      <b style=\"color:#2fd0ff\">IT<\/b> &mdash; Benvenuto in <b>miraFONT<\/b>: un carattere originale nato da una matrice di nodi 5&times;7, senza outline di terze parti. 21 tagli in 3 texture (Dots, Linear, Spline), dal desktop al web fino ai display OLED su ESP32. &Egrave; rilasciato in <b style=\"color:#7dffb0\">CC0 &mdash; pubblico dominio<\/b>: usalo, modificalo e ridistribuiscilo liberamente, anche per scopi commerciali, senza attribuzione. &Egrave; di tutti.\n    <\/p>\n    <p style=\"font-family:'Space Mono',monospace;font-size:14px;line-height:1.8;color:#8fb6e0;margin:8px 0 0\">\n      <b style=\"color:#2fd0ff\">EN<\/b> &mdash; Welcome to <b>miraFONT<\/b>: an original typeface built from a 5&times;7 node matrix, no third-party outlines. 21 cuts in 3 textures, from desktop to ESP32 OLED displays. Released under <b style=\"color:#7dffb0\">CC0 &mdash; public domain<\/b>: free for everyone, any use, no attribution required.\n    <\/p>\n    <p style=\"font-family:'Space Mono',monospace;font-size:14px;line-height:1.8;color:#ffcf6b;margin:10px 0 0\">\n      &#9654; <b>In arrivo / Coming up<\/b> &mdash; il <a href=\"https://doi.org/10.5281/zenodo.19402571\" style=\"color:#2fd0ff;font-weight:700\">miraNET Digital Runtime<\/a> &egrave; interamente basato su miraFONT: questa &egrave; la sua tipografia nativa. / The <a href=\"https://doi.org/10.5281/zenodo.19402571\" style=\"color:#2fd0ff;font-weight:700\">miraNET Digital Runtime<\/a> is built on miraFONT &mdash; this is its native typeface. &middot; DOI: 10.5281/zenodo.19402571\n    <\/p>\n    <details style=\"margin-top:14px\">\n      <summary style=\"font-family:'Space Mono',monospace;font-size:14px;font-weight:700;color:#ffcf6b;cursor:pointer\">Note / Notes &mdash; installazione &amp; download<\/summary>\n      <div style=\"font-family:'Space Mono',monospace;font-size:13px;line-height:1.9;color:#b9d4f0;padding:10px 0 2px\">\n        &bull; <b>Installazione<\/b>: Windows/macOS &rarr; doppio clic su un .ttf o .otf &rarr; Installa &middot; Linux &rarr; copia in ~/.local/share/fonts/ poi <span style=\"color:#7dffb0\">fc-cache -f<\/span><br>\n        &bull; <b>Web<\/b>: &lt;link rel=\"stylesheet\" href=\"fonts/miraFONT.css\"&gt; &mdash; tutti i 21 tagli gi&agrave; pronti / all 21 cuts ready to use<br>\n        &bull; <b>ESP32<\/b>: nella cartella esp32/ trovi il font in C ANSI, il driver SSD1306 e le demo Arduino ed ESP-IDF &mdash; provalo nel simulatore OLED qui sotto / try it in the OLED simulator below<br>\n        &bull; <b>Download<\/b>: <a href=\"https://github.com/umeglio/miraFONT\" style=\"color:#2fd0ff\">github.com/umeglio/miraFONT<\/a> &middot; Licenza / License: <a href=\"https://github.com/umeglio/miraFONT/blob/main/LICENSE\" style=\"color:#2fd0ff\">CC0 1.0 Universal<\/a><br>\n        &bull; miraNET / Umberto Meglio, 2026 &mdash; <i>where data speaks C.<\/i>\n      <\/div>\n    <\/details>\n  <\/div>\n<\/section>\n\n<div style=\"position:relative;min-height:100vh;background:radial-gradient(125% 80% at 50% -8%, #0c2150 0%, #061229 40%, #03060f 100%);overflow:hidden\">\n  <sc-if value=\"{{ bgGrid }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"position:fixed;inset:0;pointer-events:none;z-index:0;background-image:linear-gradient(rgba(47,208,255,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(47,208,255,.05) 1px,transparent 1px);background-size:44px 44px;mask-image:radial-gradient(circle at 50% 30%,#000 0%,transparent 78%);-webkit-mask-image:radial-gradient(circle at 50% 30%,#000 0%,transparent 78%)\"><\/div>\n  <\/sc-if>\n  <div style=\"position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:26px 44px 110px\">\n\n    <div style=\"display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(47,208,255,.16);padding-bottom:16px;margin-bottom:44px;flex-wrap:wrap;gap:12px\">\n      <div style=\"display:flex;align-items:center;gap:13px\">\n        <div style=\"width:24px;height:24px;border-radius:6px;background:linear-gradient(135deg,#2fd0ff,#1e7bff);box-shadow:0 0 16px rgba(47,208,255,.6);display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-weight:700;font-size:13px;color:#03060f\">M<\/div>\n        <div style=\"display:flex;align-items:center;cursor:pointer;transition:filter .25s,transform .25s\" style-hover=\"filter:drop-shadow(0 0 12px rgba(47,208,255,.85));transform:scale(1.04)\">{{ wordmarkSvg }}<\/div>\n        <div style=\"font-family:'Space Mono',monospace;font-size:10.5px;letter-spacing:.16em;color:#6a82ab;margin-left:4px\">DIGITAL RUNTIME TYPE SYSTEM<\/div>\n      <\/div>\n      <div style=\"font-family:'Space Mono',monospace;font-size:10.5px;letter-spacing:.14em;color:#6a82ab\">v0.4 \u00b7 miraNET \u00b7 2026<\/div>\n    <\/div>\n\n    <section style=\"padding:8px 0 30px\">\n      <div style=\"font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.24em;color:#2fd0ff;margin-bottom:26px\">01 / SPECIMEN<\/div>\n      <div style=\"position:relative\">\n        <div style=\"display:flex;align-items:center\">{{ heroSvg }}<\/div>\n        <div style=\"height:50px;overflow:hidden;margin-top:1px\"><div class=\"mira-lake\">{{ heroMirror }}<\/div><\/div>\n      <\/div>\n      <div style=\"margin-top:18px;max-width:780px;font-size:15px;line-height:1.7;color:#bcd3f0\">\n        The native display face of the miraNET <strong style=\"color:#2fd0ff;font-weight:600\">Digital Runtime<\/strong>. A 5\u00d77 node matrix, compiled parametrically from one source \u2014 <strong style=\"color:#d6ecff\">monospaced and uniform, proportioned like Consolas<\/strong>. Two cuts share the grid: the dotted matrix, and a merged <strong style=\"color:#d6ecff\">Linear<\/strong> stroke for crisp small text.\n      <\/div>\n      <div style=\"margin-top:14px;font-family:'Space Mono',monospace;font-size:12px;color:#6a82ab\">// where data speaks C \u2014 Umberto Meglio, Naples 2026<\/div>\n    <\/section>\n\n    <section style=\"border:1px solid rgba(47,208,255,.28);background:rgba(47,208,255,.045);border-radius:10px;padding:22px 24px;margin:6px 0 46px\">\n      <div style=\"font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.2em;color:#2fd0ff;margin-bottom:13px\">\u25b8 ROUND 4 \u2014 FULL FONT FAMILY, SHIPPED<\/div>\n      <div style=\"font-size:13px;line-height:1.8;color:#bcd3f0\">\n        Every cut now exports as <strong style=\"color:#d6ecff\">.otf + .ttf + .woff2 + .woff<\/strong> with a ready <span style=\"color:#2fd0ff\">miraFONT.css<\/span>. The <strong style=\"color:#d6ecff\">Linear<\/strong> version is built with a true <strong style=\"color:#d6ecff\">boolean-union<\/strong> \u2014 one merged contour per stroke (clean counters, hint-ready at small sizes). Proportions are Consolas-tight and uniform; nodes are dense so light themes read solid black (<span style=\"color:#2fd0ff\">08<\/span>).\n      <\/div>\n    <\/section>\n\n    <section style=\"margin-bottom:54px\">\n      <div style=\"font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.24em;color:#2fd0ff;margin-bottom:8px\">02 / COMPILE &amp; INSTALL<\/div>\n      <div style=\"font-size:16px;margin-bottom:6px;font-weight:500\" class=\"mf\">Bring it to life <span style=\"color:#6a82ab;font-weight:400\">\u2014 each download is .otf + .ttf + .woff2 + .woff + a wired CSS, zipped.<\/span><\/div>\n      <div style=\"font-family:'Space Mono',monospace;font-size:11.5px;margin-bottom:14px\">\n        <sc-if value=\"{{ libReady }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"color:#5ef2a0\">\u25cf exporter ready<\/span><\/sc-if>\n        <sc-if value=\"{{ libLoading }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"color:#ffb454\">\u25cb compiling exporter\u2026<\/span><\/sc-if>\n      <\/div>\n      <sc-if value=\"{{ busy }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"font-family:'Space Mono',monospace;font-size:11.5px;color:#ffb454;margin:-4px 0 16px\">\u23f3 compiling {{ busyLabel }} \u2014 .otf \u00b7 .ttf \u00b7 .woff2 \u00b7 .woff \u2026<\/div>\n      <\/sc-if>\n      <sc-if value=\"{{ woff2Note }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"font-family:'Space Mono',monospace;font-size:11px;line-height:1.6;color:#8fb6e0;margin:-4px 0 16px\">\u2139 this browser skipped <b style=\"color:#d6ecff\">.woff2<\/b> (wasm unavailable) \u2014 your .zip still has <b style=\"color:#d6ecff\">.woff + .ttf + .otf<\/b> and the CSS falls back automatically.<\/div>\n      <\/sc-if>\n      <div style=\"margin-bottom:24px\">\n        <button class=\"mn-eb\" onclick=\"{{ onDownloadAll }}\" style=\"cursor:pointer;background:linear-gradient(135deg,rgba(47,208,255,.18),rgba(30,123,255,.12));border:1px solid rgba(47,208,255,.45);border-radius:10px;paddin ent:space-between;align-items:center;gap:8px;cursor:pointer;background:#0a1430;border:1px solid rgba(47,208,255,.2);border-radius:8px;padding:11px 13px;color:#d6ecff;font-family:inherit;transition:all .15s\"><span style=\"font-size:13px;font-weight:600\">{{ e.name }}<\/span><span style=\"color:#2fd0ff;font-size:13px\">.zip\u2193<\/span><\/button>\n            <\/sc-for>\n          <\/div>\n        <\/div>\n        <div>\n          <div style=\"font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.14em;color:#2fd0ff;margin-bottom:13px\">\u2248 SPLINE <span style=\"color:#6a82ab\">\u00b7 8 cuts \u00b7 smooth monoline<\/span><\/div>\n          <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px\">\n            <sc-for list=\"{{ exportSpline }}\" as=\"e\" hint-placeholder-count=\"8\">\n              <button class=\"mn-eb\" onclick=\"{{ e.onClick }}\" style=\"display:flex;justify-content:space-between;align-items:center;gap:8px;cursor:pointer;background:#0a1430;border:1px solid rgba(47,208,255,.2);border-radius:8px;padding:11px 13px;color:#d6ecff;font-family:inherit;transition:all .15s\"><span style=\"font-size:13px;font-weight:600\">{{ e.name }}<\/span><span style=\"color:#2fd0ff;font-size:13px\">.zip\u2193<\/span><\/button>\n            <\/sc-for>\n          <\/div>\n        <\/div>\n      <\/div>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:13px\">\n        <div style=\"background:#0a1430;border:1px solid rgba(47,208,255,.14);border-radius:10px;padding:17px 18px\">\n          <div style=\"font-size:13px;font-weight:600;margin-bottom:9px;display:flex;align-items:center;gap:8px\"><span style=\"width:7px;height:7px;border-radius:50%;background:#2fd0ff;box-shadow:0 0 8px #2fd0ff\"><\/span>Windows<\/div>\n          <div style=\"font-family:'Space Mono',monospace;font-size:11px;line-height:1.7;color:#9ab4d6\">Double-click the .ttf or .otf \u2192 <strong style=\"color:#d6ecff\">Install<\/strong>. Or drop into <span style=\"color:#2fd0ff\">C:\\Windows\\Fonts<\/span>.<\/div>\n        <\/div>\n        <div style=\"background:#0a1430;border:1px solid rgba(47,208,255,.14);border-radius:10px;padding:17px 18px\">\n          <div style=\"font-size:13px;font-weight:600;margin-bottom:9px;display:flex;align-items:center;gap:8px\"><span style=\"width:7px;height:7px;border-radius:50%;background:#2fd0ff;box-shadow:0 0 8px #2fd0ff\"><\/span>macOS<\/div>\n          <div style=\"font-family:'Space Mono',monospace;font-size:11px;line-height:1.7;color:#9ab4d6\">Double-click \u2192 <strong style=\"color:#d6ecff\">Install Font<\/strong> in Font&nbsp;Book.<\/div>\n        <\/div>\n        <div style=\"background:#0a1430;border:1px solid rgba(47,208,255,.14);border-radius:10px;padding:17px 18px\">\n          <div style=\"font-size:13px;font-weight:600;margin-bottom:9px;display:flex;align-items:center;gap:8px\"><span style=\"width:7px;height:7px;border-radius:50%;background:#2fd0ff;box-shadow:0 0 8px #2fd0ff\"><\/span>Linux<\/div>\n          <div style=\"font-family:'Space Mono',monospace;font-size:11px;line-height:1.7;color:#9ab4d6\">Copy to <span style=\"color:#2fd0ff\">~/.local/share/fonts/<\/span> then <span style=\"color:#2fd0ff\">fc-cache -f<\/span>.<\/div>\n        <\/div>\n        <div style=\"background:#0a1430;border:1px solid rgba(47,208,255,.14);border-radius:10px;padding:17px 18px\">\n          <div style=\"font-size:13px;font-weight:600;margin-bottom:9px;display:flex;align-items:center;gap:8px\"><span style=\"width:7px;height:7px;border-radius:50%;background:#2fd0ff;box-shadow:0 0 8px #2fd0ff\"><\/span>Web<\/div>\n          <pre style=\"font-size:9.5px;line-height:1.5;color:#9ab4d6;white-space:pre-wrap;word-break:break-word\">@font-face{\n  font-family:'miraFONT';\n  src:url('miraFONT-Regular-Dots.woff2') format('woff2'),\n      url('miraFONT-Regular-Dots.woff') format('woff'),\n      url('miraFONT-Regular-Dots.otf') format('opentype');\n}<\/pre>\n        <\/div>\n      <\/div>\n      <div style=\"margin-top:22px;background:#060d20;border:1px solid rgba(47,208,255,.14);border-radius:10px;padding:20px 22px;display:flex;gap:20px;align-items:center;flex-wrap:wrap\">\n        <div style=\"flex:0 0 auto;font-family:'Space Mono',monospace;font-size:10.5px;letter-spacing:.1em;color:#5ef2a0\">\u25cf COMPILED IN-BROWSER \u00b7 LIVE PROOF<\/div>\n        <div style=\"flex:1 1 320px;min-width:0\">\n          <div style=\"font-family:'miraFONTLive','Space Mono',monospace;font-size:30px;line-height:1.3;color:#d6ecff;text-shadow:0 0 14px rgba(47,208,255,.45)\">Data speaks C<\/div>\n          <div style=\"font-family:'miraFONTLive','Space Mono',monospace;font-size:18px;line-height:1.4;color:#8fb6e0;margin-top:6px\">miraNET digital runtime 0123<\/div>\n        <\/div>\n        <div style=\"flex:0 0 auto;font-family:'Space Mono',monospace;font-size:10px;color:#6a82ab;max-width:170px\">\u2191 real HTML text in the generated miraFONT (Spline cut \u2014 smooth monoline)<\/div>\n      <\/div>\n    <\/section>\n\n    <section style=\"margin-bottom:54px\">\n      <div style=\"font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.24em;color:#2fd0ff;margin-bottom:8px\">03 / STYLES<\/div>\n      <div style=\"font-size:16px;margin-bottom:24px;font-weight:500\" class=\"mf\">The family. <span style=\"color:#6a82ab;font-weight:400\">Light \u00b7 Regular \u00b7 Bold \u00b7 Black, plus Italic \u00b7 Compressed \u00b7 Narrow \u00b7 Double Strike.<\/span><\/div>\n      <div style=\"display:flex;flex-direction:column;gap:1px;background:rgba(47,208,255,.12);border:1px solid rgba(47,208,255,.14);border-radius:11px;overflow:hidden\">\n        <sc-for list=\"{{ styleSamples }}\" as=\"s\" hint-placeholder-count=\"8\">\n          <div style=\"background:#081026;padding:20px 26px;display:flex;align-items:center;gap:30px;flex-wrap:wrap\">\n            <div style=\"flex:0 0 158px\">\n              <div style=\"font-size:15px;color:#2fd0ff;font-weight:600\">{{ s.name }}<\/div>\n              <div style=\"font-family:'Space Mono',monospace;font-size:10.5px;color:#6a82ab;margin-top:5px\">{{ s.param }}<\/div>\n            <\/div>\n            <div style=\"flex:1 1 300px;min-width:0;overflow-x:auto;padding:4px 0\">{{ s.svg }}<\/div>\n            <div style=\"flex:0 0 220px;font-size:12px;line-height:1.6;color:#8fb6e0\">{{ s.desc }}<\/div>\n          <\/div>\n        <\/sc-for>\n      <\/div>\n    <\/section>\n\n    <section style=\"margin-bottom:54px\">\n      <div style=\"font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.24em;color:#2fd0ff;margin-bottom:8px\">04 / LIVE<\/div>\n      <div style=\"font-size:16px;margin-bottom:22px;font-weight:500\" class=\"mf\">Type something. <span style=\"color:#6a82ab;font-weight:400\">Render it in any cut. (Dots / Linear toggle in Tweaks \u2197)<\/span><\/div>\n      <div style=\"border:1px solid rgba(47,208,255,.14);border-radius:11px;background:#081026;padding:24px 26px\">\n        <div style=\"display:flex;gap:16px;flex-wrap:wrap;align-items:center;margin-bottom:20px\">\n          <input value=\"{{ testerText }}\" onchange=\"{{ onTesterText }}\" placeholder=\"type here\u2026\" style=\"flex:1 1 260px;background:#03060f;border:1px solid rgba(47,208,255,.24);color:#d6ecff;font-family:'Space Mono',monospace;font-size:14px;padding:11px 14px;border-radius:8px;outline:none\">\n          <div style=\"display:flex;gap:11px;align-items:center\">\n            <span style=\"font-family:'Space Mono',monospace;font-size:10.5px;color:#6a82ab;letter-spacing:.1em\">SIZE<\/span>\n            <input type=\"range\" min=\"8\" max=\"32\" value=\"{{ testerSize }}\" onchange=\"{{ onTesterSize }}\" style=\"width:130px\">\n          <\/div>\n        <\/div>\n        <div style=\"display:flex;gap:9px;flex-wrap:wrap;margin-bottom:26px\">\n          <sc-for list=\"{{ styleBtns }}\" as=\"b\" hint-placeholder-count=\"8\">\n            <button class=\"mn-sb\" onclick=\"{{ b.onClick }}\" style=\"{{ b.style }}\">{{ b.label }}<\/button>\n          <\/sc-for>\n        <\/div>\n        <div style=\"min-height:96px;display:flex;align-items:center;overflow-x:auto;padding:8px 0\">{{ testerSvg }}<\/div>\n      <\/div>\n    <\/section>\n\n    <section style=\"margin-bottom:54px\">\n      <div style=\"font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.24em;color:#2fd0ff;margin-bottom:8px\">05 / CHARACTER SET<\/div>\n      <div style=\"font-size:16px;margin-bottom:24px;font-weight:500\" class=\"mf\">The repertoire. <span style=\"color:#6a82ab;font-weight:400\">Latin \u00b7 numerals \u00b7 punctuation \u00b7 Italian accents.<\/span><\/div>\n      <div style=\"font-family:'Space Mono',monospace;font-size:10.5px;letter-spacing:.14em;color:#6a82ab;margin:0 0 11px\">UPPERCASE<\/div>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(66px,1fr));gap:9px;margin-bottom:26px\">\n        <sc-for list=\"{{ glyphsUpper }}\" as=\"g\" hint-placeholder-count=\"26\">\n          <div style=\"background:#081026;border:1px solid rgba(47,208,255,.1);border-radius:7px;aspect-ratio:1/1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;padding:8px\"><div style=\"flex:1;display:flex;align-items:center;justify-content:center\">{{ g.svg }}<\/div><div style=\"font-family:'Space Mono',monospace;font-size:10px;color:#6a82ab\">{{ g.label }}<\/div><\/div>\n        <\/sc-for>\n      <\/div>\n      <div style=\"font-family:'Space Mono',monospace;font-size:10.5px;letter-spacing:.14em;color:#6a82ab;margin:0 0 11px\">LOWERCASE<\/div>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(66px,1fr));gap:9px;margin-bottom:26px\">\n        <sc-for list=\"{{ glyphsLower }}\" as=\"g\" hint-placeholder-count=\"26\">\n          <div style=\"background:#081026;border:1px solid rgba(47,208,255,.1);border-radius:7px;aspect-ratio:1/1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;padding:8px\"><div style=\"flex:1;display:flex;align-items:center;justify-content:center\">{{ g.svg }}<\/div><div style=\"font-family:'Space Mono',monospace;font-size:10px;color:#6a82ab\">{{ g.label }}<\/div><\/div>\n        <\/sc-for>\n      <\/div>\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:26px\">\n        <div>\n          <div style=\"font-family:'Space Mono',monospace;font-size:10.5px;letter-spacing:.14em;color:#6a82ab;margin:0 0 11px\">NUMERALS<\/div>\n          <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(60px,1fr));gap:9px\">\n            <sc-for list=\"{{ glyphsDigits }}\" as=\"g\" hint-placeholder-count=\"10\">\n              <div style=\"background:#081026;border:1px solid rgba(47,208,255,.1);border-radius:7px;aspect-ratio:1/1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;padding:8px\"><div style=\"flex:1;display:flex;align-items:center;justify-content:center\">{{ g.svg }}<\/div><div style=\"font-family:'Space Mono',monospace;font-size:10px;color:#6a82ab\">{{ g.label }}<\/div><\/div>\n            <\/sc-for>\n          <\/div>\n        <\/div>\n        <div>\n          <div style=\"font-family:'Space Mono',monospace;font-size:10.5px;letter-spacing:.14em;color:#6a82ab;margin:0 0 11px\">ACCENTS<\/div>\n          <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(60px,1fr));gap:9px\">\n            <sc-for list=\"{{ glyphsAccent }}\" as=\"g\" hint-placeholder-count=\"8\">\n              <div style=\"background:#081026;border:1px solid rgba(47,208,255,.1);border-radius:7px;aspect-ratio:1/1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;padding:8px\"><div style=\"flex:1;display:flex;align-items:center;justify-content:center\">{{ g.svg }}<\/div><div style=\"font-family:'Space Mono',monospace;font-size:10px;color:#6a82ab\">{{ g.label }}<\/div><\/div>\n            <\/sc-for>\n          <\/div>\n        <\/div>\n      <\/div>\n      <div style=\"font-family:'Space Mono',monospace;font-size:10.5px;letter-spacing:.14em;color:#6a82ab;margin:26px 0 11px\">PUNCTUATION &amp; SYMBOLS<\/div>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(60px,1fr));gap:9px\">\n        <sc-for list=\"{{ glyphsPunct }}\" as=\"g\" hint-placeholder-count=\"28\">\n          <div style=\"background:#081026;border:1px solid rgba(47,208,255,.1);border-radius:7px;aspect-ratio:1/1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;padding:8px\"><div style=\"flex:1;display:flex;align-items:center;justify-content:center\">{{ g.svg }}<\/div><div style=\"font-family:'Space Mono',monospace;font-size:10px;color:#6a82ab\">{{ g.label }}<\/div><\/div>\n        <\/sc-for>\n      <\/div>\n    <\/section>\n\n    <section style=\"margin-bottom:54px\">\n      <div style=\"font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.24em;color:#2fd0ff;margin-bottom:8px\">06 / IN USE<\/div>\n      <div style=\"font-size:16px;margin-bottom:24px;font-weight:500\" class=\"mf\">On the runtime.<\/div>\n      <div style=\"border:1px solid rgba(47,208,255,.14);border-radius:11px;background:#060d20;overflow:hidden;margin-bottom:18px\">\n        <div style=\"display:flex;gap:7px;align-items:center;padding:12px 16px;border-bottom:1px solid rgba(47,208,255,.12)\">\n          <span style=\"width:9px;height:9px;border-radius:50%;background:#ff5f57\"><\/span>\n          <span style=\"width:9px;height:9px;border-radius:50%;background:#febc2e\"><\/span>\n          <span style=\"width:9px;height:9px;border-radius:50%;background:#28c840\"><\/span>\n          <span style=\"font-family:'Space Mono',monospace;font-size:11px;color:#6a82ab;margin-left:10px\">mira://runtime \u2014 dispatcher<\/span>\n        <\/div>\n        <div style=\"padding:20px 22px;display:flex;flex-direction:column;gap:11px;overflow-x:auto\">\n          <sc-for list=\"{{ termLines }}\" as=\"t\" hint-placeholder-count=\"5\">{{ t.svg }}<\/sc-for>\n        <\/div>\n      <\/div>\n      <div style=\"display:grid;grid-template-columns:1.2fr 1fr;gap:18px\">\n        <div style=\"background:#081026;border:1px solid rgba(47,208,255,.14);border-radius:11px;padding:20px 22px\">\n          <div style=\"font-family:'Space Mono',monospace;font-size:10.5px;letter-spacing:.14em;color:#6a82ab;margin-bottom:16px\">MODULE LABELS<\/div>\n          <div style=\"display:flex;gap:11px;flex-wrap:wrap\">\n            <sc-for list=\"{{ chipItems }}\" as=\"c\" hint-placeholder-count=\"6\">\n              <div style=\"border:1px solid rgba(47,208,255,.32);background:rgba(47,208,255,.07);border-radius:6px;padding:9px 13px;display:flex;align-items:center\">{{ c.svg }}<\/div>\n            <\/sc-for>\n          <\/div>\n        <\/div>\n        <div style=\"background:#081026;border:1px solid rgba(47,208,255,.14);border-radius:11px;padding:20px 22px\">\n          <div style=\"font-family:'Space Mono',monospace;font-size:10.5px;letter-spacing:.14em;color:#6a82ab;margin-bottom:16px\">DATA READOUT<\/div>\n          <div style=\"display:flex;gap:30px;flex-wrap:wrap\">\n            <sc-for list=\"{{ numItems }}\" as=\"n\" hint-placeholder-count=\"3\">\n              <div style=\"display:flex;flex-direction:column;gap:8px\"><div>{{ n.svg }}<\/div><div style=\"font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.12em;color:#6a82ab\">{{ n.label }}<\/div><\/div>\n            <\/sc-for>\n          <\/div>\n        <\/div>\n      <\/div>\n    <\/section>\n\n    <section style=\"margin-bottom:54px\">\n      <div style=\"font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.24em;color:#2fd0ff;margin-bottom:8px\">07 / NODE TEXTURES<\/div>\n      <div style=\"font-size:16px;margin-bottom:22px;font-weight:500\" class=\"mf\">Same glyphs, different node. <span style=\"color:#6a82ab;font-weight:400\">Dots and Linear are the two you export.<\/span><\/div>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(224px,1fr));gap:14px\">\n        <sc-for list=\"{{ textureSamples }}\" as=\"x\" hint-placeholder-count=\"4\">\n          <div style=\"border:1px solid rgba(47,208,255,.14);border-radius:11px;background:#081026;padding:22px;display:flex;flex-direction:column;gap:15px;align-items:center\">\n            <div style=\"min-height:62px;display:flex;align-items:center\">{{ x.svg }}<\/div>\n            <div style=\"font-family:'Space Mono',monospace;font-size:10.5px;letter-spacing:.14em;color:#6a82ab\">{{ x.label }}<\/div>\n          <\/div>\n        <\/sc-for>\n      <\/div>\n    <\/section>\n\n    <section style=\"margin-bottom:54px\">\n      <div style=\"font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.24em;color:#2fd0ff;margin-bottom:8px\">08 / ON LIGHT<\/div>\n      <div style=\"font-size:16px;margin-bottom:6px;font-weight:500\" class=\"mf\">Black on light. <span style=\"color:#6a82ab;font-weight:400\">Denser nodes read solid \u2014 not faint grey \u2014 on light Windows themes.<\/span><\/div>\n      <div style=\"margin-top:22px;background:#f4f7fb;border:1px solid rgba(47,208,255,.2);border-radius:12px;padding:30px 30px 26px\">\n        <div style=\"display:flex;flex-direction:column;gap:24px\">\n          <div style=\"display:flex;align-items:center;gap:22px;flex-wrap:wrap\">\n            <span style=\"flex:0 0 64px;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.14em;color:#5b7290\">DOTS<\/span>\n            <div style=\"overflow-x:auto\">{{ lightDots }}<\/div>\n          <\/div>\n          <div style=\"height:1px;background:#dce4ee\"><\/div>\n          <div style=\"display:flex;align-items:center;gap:22px;flex-wrap:wrap\">\n            <span style=\"flex:0 0 64px;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.14em;color:#5b7290\">LINEAR<\/span>\n            <div style=\"overflow-x:auto\">{{ lightLinear }}<\/div>\n          <\/div>\n        <\/div>\n        <div style=\"margin-top:22px;font-family:'Space Mono',monospace;font-size:11px;color:#5b7290\">// the font carries no colour \u2014 it takes the text colour. On light UI, set it #0b1018 and it's pure black.<\/div>\n      <\/div>\n    <\/section>\n\n    <section style=\"margin-bottom:54px\">\n      <div style=\"font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.24em;color:#2fd0ff;margin-bottom:8px\">09 / LAKE REFLECTION<\/div>\n      <div style=\"font-size:16px;margin-bottom:6px;font-weight:500\" class=\"mf\">Like water. <span style=\"color:#6a82ab;font-weight:400\">Mirrored at \u2153 height, softened and faded \u2014 a reusable feature.<\/span><\/div>\n      <div style=\"margin-top:22px;border:1px solid rgba(47,208,255,.16);border-radius:14px;background:linear-gradient(180deg,#0a1838 0%,#050b1e 100%);padding:54px 30px 26px;display:flex;flex-direction:column;align-items:center;overflow:hidden;position:relative\">\n        <div style=\"position:absolute;top:0;left:0;right:0;height:140px;background:radial-gradient(58% 100% at 50% 0,rgba(47,208,255,.2),transparent);pointer-events:none\"><\/div>\n        <div style=\"position:relative;z-index:1\">{{ reflectMain }}<\/div>\n        <div style=\"height:74px;overflow:hidden;width:100%;text-align:center\"><div class=\"mira-lake\">{{ reflectMirror }}<\/div><\/div>\n      <\/div>\n      <div style=\"margin-top:16px;background:#081026;border:1px solid rgba(47,208,255,.14);border-radius:10px;padding:18px 20px\">\n        <div style=\"font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.14em;color:#6a82ab;margin-bottom:10px\">CSS RECIPE \u2014 the lake feature<\/div>\n        <pre style=\"font-size:11px;line-height:1.6;color:#9ab4d6;white-space:pre-wrap\">.mira-lake{                                  /* a duplicate of the text */\n  transform:scaleY(-0.34) translateY(-100%); /* mirror + squash to 1/3  */\n  display:inline-block; transform-origin:top; opacity:.6; filter:blur(.35px);\n  -webkit-mask-image:linear-gradient(to top,#000,transparent 74%);\n          mask-image:linear-gradient(to top,#000,transparent 74%);\n}\n.mira-shine{ background:linear-gradient(#a8ecff,#2fd0ff);\n  -webkit-background-clip:text; background-clip:text; color:transparent; }<\/pre>\n      <\/div>\n    <\/section>\n\n    <section style=\"margin-bottom:50px\">\n      <div style=\"font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.24em;color:#2fd0ff;margin-bottom:8px\">10 / HYPERLINKS<\/div>\n      <div style=\"font-size:16px;margin-bottom:6px;font-weight:500\" class=\"mf\">Make links signal. <span style=\"color:#6a82ab;font-weight:400\">Three treatments \u2014 the runtime default is the glow underline.<\/span><\/div>\n      <div style=\"margin-top:22px;background:#081026;border:1px solid rgba(47,208,255,.14);border-radius:11px;padding:24px 26px\">\n        <p style=\"font-size:15.5px;line-height:2.1;color:#bcd3f0;margin:0 0 22px;max-width:680px\">\n          The dispatcher routes through <a class=\"mn-link\" href=\"#top\">native completion ports<\/a>, where <a class=\"mn-link\" href=\"#top\">data speaks C<\/a> \u2014 open the <a class=\"mn-link\" href=\"#top\">miraGRID engine<\/a> for tabular output, or the <a class=\"mn-link\" href=\"#top\">miraAGENT bridge<\/a> to drive deployment.\n        <\/p>\n        <div style=\"display:flex;gap:34px;flex-wrap:wrap;align-items:center;padding-top:20px;border-top:1px solid rgba(47,208,255,.1)\">\n          <div style=\"display:flex;flex-direction:column;gap:11px\"><span style=\"font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.13em;color:#6a82ab\">GLOW UNDERLINE \u00b7 default<\/span><a class=\"mn-link\" href=\"#top\" style=\"font-size:18px\">miraNET runtime<\/a><\/div>\n          <div style=\"display:flex;flex-direction:column;gap:11px\"><span style=\"font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.13em;color:#6a82ab\">BRACKETED \u00b7 code/cli<\/span><a class=\"mn-link-b\" href=\"#top\" style=\"font-size:17px\">[miraNET runtime]<\/a><\/div>\n          <div style=\"display:flex;flex-direction:column;gap:11px\"><span style=\"font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.13em;color:#6a82ab\">TAGGED \u00b7 nav/list<\/span><a class=\"mn-link-t\" href=\"#top\" style=\"font-size:18px\">miraNET runtime<\/a><\/div>\n        <\/div>\n        <div style=\"margin-top:22px;font-family:'Space Mono',monospace;font-size:12px;color:#6a82ab\">contatto: <a class=\"mn-link\" href=\"mailto:umberto.meglio@libero.it\">umberto.meglio@libero.it<\/a><\/div>\n      <\/div>\n    <\/section>\n\n    <svg width=\"0\" height=\"0\" style=\"position:absolute;pointer-events:none\" aria-hidden=\"true\"><defs>\n      <linearGradient id=\"foxg\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\"><stop offset=\"0\" stop-color=\"#a8ecff\"><\/stop><stop offset=\"1\" stop-color=\"#1e7bff\"><\/stop><\/linearGradient>\n      <symbol id=\"foxsym\" viewBox=\"0 0 100 100\">\n        <polygon points=\"50,94 73,67 86,56 73,48 79,9 53,34 50,38 47,34 21,9 27,48 14,56 27,67\" fill=\"rgba(47,208,255,.07)\" stroke=\"url(#foxg)\" stroke-width=\"2.6\" stroke-linejoin=\"round\"><\/polygon>\n        <polygon points=\"28,17 45,34 36,33\" fill=\"rgba(47,208,255,.30)\"><\/polygon>\n        <polygon points=\"72,17 55,34 64,33\" fill=\"rgba(47,208,255,.30)\"><\/polygon>\n        <polyline points=\"25,61 33,33 50,54 67,33 75,61\" fill=\"none\" stroke=\"url(#foxg)\" stroke-width=\"7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\/polyline>\n        <polygon points=\"32,46 45,51 33,56\" fill=\"#bff0ff\" class=\"mn-eye\"><\/polygon>\n        <polygon points=\"68,46 55,51 67,56\" fill=\"#bff0ff\" class=\"mn-eye\"><\/polygon>\n        <polygon points=\"50,62 55,67 50,73 45,67\" fill=\"#2fd0ff\"><\/polygon>\n      <\/symbol>\n    <\/defs><\/svg>\n\n    <section style=\"margin-bottom:54px\">\n      <div style=\"font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.24em;color:#2fd0ff;margin-bottom:8px\">11 / FOX MARK<\/div>\n      <div class=\"mf\" style=\"font-size:16px;margin-bottom:6px;font-weight:500\">A fox for the runtime. <span style=\"color:#6a82ab;font-weight:400\">\u2014 an original mark, a nod to Visual FoxPro, rebuilt as miraNET circuitry.<\/span><\/div>\n      <div style=\"margin-top:22px;display:grid;grid-template-columns:auto 1fr;gap:18px;align-items:stretch\">\n        <div style=\"width:200px;height:200px;border:1px solid rgba(47,208,255,.16);border-radius:14px;background:radial-gradient(circle at 50% 38%,#0c2150,#050b1e);display:flex;align-items:center;justify-content:center;padding:12px\">\n          <dc-import name=\"FoxLogo\" style=\"width:176px;height:176px\" hint-size=\"176px,176px\"><\/dc-import>\n        <\/div>\n        <div style=\"border:1px solid rgba(47,208,255,.14);border-radius:14px;background:#081026;padding:24px;display:flex;flex-direction:column;justify-content:center;gap:18px\">\n          <div style=\"display:flex;align-items:center;gap:16px\">\n            <svg viewBox=\"0 0 100 100\" width=\"48\" height=\"48\" style=\"overflow:visible;display:block;filter:drop-shadow(0 0 8px rgba(47,208,255,.45))\"><use href=\"#foxsym\"><\/use><\/svg>\n            <div class=\"mf\" style=\"font-size:30px;color:#d6ecff;text-shadow:0 0 14px rgba(47,208,255,.45)\">miraNET<\/div>\n          <\/div>\n          <div style=\"font-size:13px;line-height:1.7;color:#8fb6e0;max-width:460px\">A low-poly fox cut from the same cyan circuitry as the runtime \u2014 angular facets, glowing eyes, one accent gradient. Original artwork: it only <em style=\"color:#bcd3f0\">evokes<\/em> the Visual FoxPro fox, it doesn't copy it. <strong style=\"color:#2fd0ff\">Hover the mark<\/strong> \u2014 it highlights and animates. It's a reusable component (<span style=\"font-family:'Space Mono',monospace;font-size:11.5px\">FoxLogo<\/span>).<\/div>\n        <\/div>\n      <\/div>\n    <\/section>\n\n    <section style=\"margin-bottom:54px\">\n      <div style=\"font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.24em;color:#2fd0ff;margin-bottom:8px\">12 / miraNET \u00b7 ASCII<\/div>\n      <div class=\"mf\" style=\"font-size:16px;margin-bottom:6px;font-weight:500\">Drawn from the matrix. <span style=\"color:#6a82ab;font-weight:400\">\u2014 miraNET spelled in miraFONT's own 5\u00d77 nodes.<\/span><\/div>\n      <div style=\"margin-top:22px;border:1px solid rgba(47,208,255,.14);border-radius:11px;background:#060d20;overflow:hidden\">\n        <div style=\"display:flex;gap:7px;align-items:center;padding:12px 16px;border-bottom:1px solid rgba(47,208,255,.12)\">\n          <span style=\"width:9px;height:9px;border-radius:50%;background:#ff5f57\"><\/span><span style=\"width:9px;height:9px;border-radius:50%;background:#febc2e\"><\/span><span style=\"width:9px;height:9px;border-radius:50%;background:#28c840\"><\/span>\n          <span style=\"font-family:'Space Mono',monospace;font-size:11px;color:#6a82ab;margin-left:10px\">mira://ascii \u2014 banner<\/span>\n        <\/div>\n        <div style=\"padding:24px;overflow-x:auto\"><pre style=\"font-family:'miraFONT','Space Mono',ui-monospace,monospace;font-size:13px;line-height:1.0;letter-spacing:0;color:#2fd0ff;text-shadow:0 0 10px rgba(47,208,255,.5);white-space:pre;margin:0\">{{ asciiNet }}<\/pre><\/div>\n      <\/div>\n    <\/section>\n\n    <section style=\"margin-bottom:54px\">\n      <div style=\"font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.24em;color:#2fd0ff;margin-bottom:8px\">13 / WAIT WINDOWS<\/div>\n      <div class=\"mf\" style=\"font-size:16px;margin-bottom:6px;font-weight:500\">Loops for the wait. <span style=\"color:#6a82ab;font-weight:400\">\u2014 drop-in loaders &amp; info toasts with the fox + logo. Continuous.<\/span><\/div>\n      <div style=\"margin-top:24px;display:flex;gap:26px;flex-wrap:wrap;align-items:flex-start\">\n        <div style=\"display:flex;flex-direction:column;gap:10px\">\n          <div style=\"width:360px;max-width:100%;border:1px so mn-d2\">.<\/span><span class=\"mn-d3\">.<\/span><\/div>\n              <div style=\"margin-top:9px;height:3px;border-radius:3px;background:rgba(47,208,255,.14);overflow:hidden\"><div class=\"mn-prog\" style=\"height:100%;background:linear-gradient(90deg,#1e7bff,#2fd0ff);box-shadow:0 0 8px rgba(47,208,255,.5)\"><\/div><\/div>\n            <\/div>\n          <\/div>\n          <div style=\"font-family:'Space Mono',monospace;font-size:10.5px;letter-spacing:.14em;color:#6a82ab\">\u25cf SMALLER \u00b7 10s LOOP<\/div>\n        <\/div>\n      <\/div>\n    <\/section>\n\n    <section style=\"margin-bottom:54px\">\n      <div style=\"font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.24em;color:#2fd0ff;margin-bottom:8px\">14 / ON HARDWARE<\/div>\n      <div class=\"mf\" style=\"font-size:16px;margin-bottom:6px;font-weight:500\">SSD1306 128\u00d764 preview. <span style=\"color:#6a82ab;font-weight:400\">\u2014 live, pixel-for-pixel what the ESP32-S3 demo paints on the ELEGOO blue/yellow OLED.<\/span><\/div>\n      <div style=\"margin-top:24px;display:flex;gap:28px;flex-wrap:wrap;align-items:flex-start\">\n        <div style=\"display:flex;flex-direction:column;align-items:center;gap:12px\">\n          <div style=\"display:flex;gap:20px;padding:0 4px 2px\">\n            <sc-for list=\"{{ oledPins }}\" as=\"p\" hint-placeholder-count=\"4\">\n              <div style=\"display:flex;flex-direction:column;align-items:center;gap:5px\">\n                <div style=\"width:9px;height:9px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#ffe08a,#b9891f);box-shadow:0 0 5px rgba(255,200,90,.5)\"><\/div>\n                <div style=\"font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.08em;color:#6a82ab\">{{ p }}<\/div>\n              <\/div>\n            <\/sc-for>\n          <\/div>\n          <div style=\"position:relative;padding:16px;border-radius:16px;background:linear-gradient(#0b1122,#070a14);border:1px solid rgba(47,208,255,.18);box-shadow:0 20px 55px rgba(0,0,0,.55),inset 0 0 0 1px rgba(255,255,255,.02)\">\n            <canvas ref=\"{{ oledRef }}\" width=\"768\" height=\"384\" style=\"display:block;width:600px;max-width:76vw;height:auto;border-radius:5px;background:#05070c\"><\/canvas>\n          <\/div>\n          <div style=\"font-family:'Space Mono',monospace;font-size:10.5px;letter-spacing:.14em;color:#6a82ab\"><span style=\"color:#5ef2a0\">\u25cf<\/span> LIVE \u00b7 128\u00d764 \u00b7 autoluminous<\/div>\n        <\/div>\n        <div style=\"flex:1 1 240px;min-width:220px;display:flex;flex-direction:column;gap:13px\">\n          <div style=\"background:#081026;border:1px solid rgba(234,255,54,.28);border-radius:11px;padding:15px 17px\">\n            <div style=\"display:flex;align-items:center;gap:9px;margin-bottom:7px\"><span style=\"width:11px;height:11px;border-radius:3px;background:#eaff36;box-shadow:0 0 8px rgba(234,255,54,.7)\"><\/span><span style=\"font-size:13px;font-weight:600;color:#eaff36\">Yellow band<\/span><\/div>\n            <div style=\"font-size:12px;line-height:1.6;color:#9ab4d6\">Rows 0\u201315. Logo + wordmark live here \u2014 the fox's ears glow yellow, the face spills into blue.<\/div>\n          <\/div>\n          <div style=\"background:#081026;border:1px solid rgba(51,200,255,.28);border-radius:11px;padding:15px 17px\">\n            <div style=\"display:flex;align-items:center;gap:9px;margin-bottom:7px\"><span style=\"width:11px;height:11px;border-radius:3px;background:#33c8ff;box-shadow:0 0 8px rgba(51,200,255,.7)\"><\/span><span style=\"font-size:13px;font-weight:600;color:#33c8ff\">Blue band<\/span><\/div>\n            <div style=\"font-size:12px;line-height:1.6;color:#9ab4d6\">Rows 16\u201363. Runtime log in the <strong style=\"color:#d6ecff\">Dots<\/strong> cut, the status line in <strong style=\"color:#d6ecff\">Solid<\/strong>, blinking cursor + progress bar.<\/div>\n          <\/div>\n          <div style=\"font-family:'Space Mono',monospace;font-size:11px;lin return GLYPHS[ch]; const up=ch.toUpperCase?ch.toUpperCase():ch; return GLYPHS[up]!=null?GLYPHS[up]:MISSING; }\nfunction linearRuns(rows){ const out=[]; for(let r=0;r<9;r++){ const l=rows[r]; let c=0; while(c<5){ if(l[c]==='1'){ let c1=c; while(c1+1<5&&l[c1+1]==='1')c1++; out.push({r,c0:c,len:c1-c+1}); c=c1+1; } else c++; } } return out; }\nfunction toU8(x){ if(x instanceof Uint8Array) return x; if(x instanceof ArrayBuffer) return new Uint8Array(x); if(ArrayBuffer.isView(x)) return new Uint8Array(x.buffer,x.byteOffset,x.byteLength); return new Uint8Array(x); }\nfunction withTimeout(p, ms){ return Promise.race([p, new Promise((_,rej)=>setTimeout(()=>rej(new Error('timeout')), ms))]); }\nfunction asciiArt(text, on, off){ const rows=[]; for(let r=0;r<9;r++){ let line=''; for(const ch of String(text)){ const g=pad9(lookup(ch)); for(let c=0;c<5;c++) line += g[r][c]==='1'?on:off; line+=off; } rows.push(line.replace(/[ ]+$/,'')); } return rows.join('\\n'); }\n\n// ===== SVG renderer (on-page display) =====\nfunction styleOpts(key, cell, color, glow, glowColor, shape){\n  const b = {cell, color, glow:!!glow, glowColor:glowColor||color, shape:shape||'round', rFactor:0.45, xScale:1, skew:0, dbl:false, dblDx:0.30, dblDy:0.18};\n  if (key === 'light') return {...b, rFactor:0.38};\n  if (key === 'bold')  return {...b, rFactor:0.54};\n  if (key === 'black') return {...b, rFactor:0.64};\n  if (key === 'italic') return {...b, skew:-13};\n  if (key === 'compressed') return {...b, xScale:0.58, rFactor:0.46};\n  if (key === 'narrow') return {...b, xScale:0.78, rFactor:0.46};\n  if (key === 'double') return {...b, dbl:true, rFactor:0.46};\n  return b;\n}\nfunction renderText(text, o){\n  const cell=o.cell, xS=o.xScale, shape=o.shape, skew=o.skew||0;\n  const colW=cell*xS, r=o.rFactor*cell;\n  let fill=o.color, defs=null;\n  if(o.gradStops){ const id=o.gradId||'grad'; defs=React.createElement('defs',{key:'defs'}, React.createElement('linearGradient',{id,x1:'0',y1:'0',x2:'0',y2:'1'}, o.gradStops.map((s,i)=>React.createElement('stop',{key:i,offset:s[0],stopColor:s[1]})))); fill='url(#'+id+')'; }\n  const els=[]; let x=0, idx=0;\n  const eX=colW*0.05, eY=cell*0.05;\n  const drawLinear=(g,ox,oy)=>{ linearRuns(g).forEach((run,ri)=>{ els.push(React.createElement('rect',{key:'L'+idx+'-'+ri+'-'+Math.round(ox), x:ox+run.c0*colW-eX, y:oy+run.r*cell-eY, width:run.len*colW+2*eX, height:cell+2*eY, fill})); }); };\n  const drawDots=(g,ox,oy)=>{ for(let row=0;row<9;row++){ const line=g[row]; for(let c=0;c<5;c++){ if(line[c]==='1'){\n    const cx=ox+c*colW+colW/2, cy=oy+row*cell+cell/2;\n    if(shape==='square'){ const s=r*1.78; els.push(React.createElement('rect',{key:'s'+idx+'-'+row+'-'+c+'-'+Math.round(ox),x:cx-s/2,y:cy-s/2,width:s,height:s,rx:s*0.14,fill})); }\n    else if(shape==='outline'){ els.push(React.createElement('circle',{key:'o'+idx+'-'+row+'-'+c+'-'+Math.round(ox),cx,cy,r:r*0.92,fill:'none',stroke:fill,strokeWidth:Math.max(1,cell*0.11)})); }\n    else { els.push(React.createElement('circle',{key:'d'+idx+'-'+row+'-'+c+'-'+Math.round(ox),cx,cy,r,fill})); }\n  }}} };\n  const drawSpline=(g,ox,oy)=>{\n    const on=(rr,cc)=> rr>=0&&rr<9&&cc>=0&&cc<5 && g[rr][cc]==='1';\n    const sw=2*r;\n    const ln=(x1,y1,x2,y2,k)=>els.push(React.createElement('line',{key:k,x1,y1,x2,y2,stroke:fill,strokeWidth:sw,strokeLinecap:'round'}));\n    for(let row=0;row<9;row++) for(let c=0;c<5;c++){ if(g[row][c]!=='1') continue;\n      const x1=ox+c*colW+colW/2, y1=oy+row*cell+cell/2;\n      if(on(row,c+1)) ln(x1,y1,x1+colW,y1,'sr'+idx+'-'+row+'-'+c+'-'+Math.round(ox));\n      if(on(row+1,c)) ln(x1,y1,x1,y1+cell,'sd'+idx+'-'+row+'-'+c+'-'+Math.round(ox));\n      if(on(row+1,c+1)&&!on(row,c+1)&&!on(row+1,c)) ln(x1,y1,x1+colW,y1+cell,'sx'+idx+'-'+row+'-'+c+'-'+Math.round(ox));\n      if(on(row+1,c-1)&&!on(row,c-1)&&!on(row+1,c)) ln(x1,y1,x1-colW,y1+cell,'sy'+idx+'-'+row+'-'+c+'-'+Math.round(ox));\n    }\n    for(let row=0;row<9;row++) for(let c=0;c<5;c++){ if(g[row][c]==='1') els.push(React.createElement('circle',{key:'sc'+idx+'-'+row+'-'+c+'-'+Math.round(ox),cx:ox+c*colW+colW/2,cy:oy+row*cell+cell/2,r,fill})); }\n  };\n  for(const ch of String(text)){\n    if(ch===' '){ x += colW*SPACE_ADV; idx++; continue; }\n    const g=pad9(lookup(ch));\n    if(shape==='linear'){ drawLinear(g,x,0); if(o.dbl) drawLinear(g, x+o.dblDx*cell, o.dblDy*cell); }\n    else if(shape==='spline'){ drawSpline(g,x,0); if(o.dbl) drawSpline(g, x+o.dblDx*cell, o.dblDy*cell); }\n    else { drawDots(g,x,0); if(o.dbl) drawDots(g, x+o.dblDx*cell, o.dblDy*cell); }\n    x += colW*ADV; idx++;\n  }\n  const H=9*cell; let W=x||colW, tx=0, group;\n  if(skew){ const pad=Math.tan(Math.abs(skew)*Math.PI/180)*H; W+=pad; tx=pad; group=React.createElement('g',{key:'g',transform:`translate(${tx},0) skewX(${skew})`}, els); }\n  else group=React.createElement('g',{key:'g'}, els);\n  if(o.dbl) W += Math.abs(o.dblDx*cell);\n  const kids = defs ? [defs, group] : [group];\n  return React.createElement('svg',{width:W,height:H,viewBox:`0 0 ${W} ${H}`,style:{display:'block',height:(o.displayH||H)+'px',width:'auto',maxWidth:'100%',overflow:'visible',filter:o.glow?`drop-shadow(0 0 ${cell*0.42}px ${o.glowColor})`:'none'}}, kids);\n}\n\n// ===== Font metadata =====\nconst FONT_FAMILY = {light:'miraFONT', normal:'miraFONT', bold:'miraFONT', black:'miraFONT', italic:'miraFONT', compressed:'miraFONT Compressed', narrow:'miraFONT Narrow', double:'miraFONT Double Strike'};\nconst FONT_STYLE  = {light:'Light', normal:'Regular', bold:'Bold', black:'Black', italic:'Italic', compressed:'Regular', narrow:'Regular', double:'Regular'};\nconst WEIGHT_CLASS = {light:300, normal:400, bold:700, black:900};\nconst CUT_NAME = {light:'Light', normal:'Regular', bold:'Bold', black:'Black', italic:'Italic', compressed:'Compressed', narrow:'Narrow', double:'DoubleStrike'};\nfunction fontGeom(key){\n  const g={r:0.45, xs:1, shear:0, dbl:false, ddx:0.30, ddy:-0.18};\n  if(key==='light')return{...g,r:0.38};\n  if(key==='bol lick the .ttf or .otf -> Install (or drop into C:\\\\Windows\\\\Fonts).\\nmacOS   double-click -> Install Font (Font Book).\\nLINUX   copy to ~/.local/share/fonts/  then:  fc-cache -f\\n\\nThe font carries no colour \u2014 it takes the text colour. Built from a 5x7 node matrix,\\nno third-party outlines. where data speaks C. \u2014 miraNET / Umberto Meglio\";\n\nclass Component extends DCLogic {\n  state = { bootIndex:0, cursorOn:true, testerText:'Runtime', testerStyle:'normal', testerSize:18, libReady:false, busy:null, woff2Note:false };\n\n  componentDidMount(){\n    this.libs={}; this._otf={};\n    const full='miraFONT'; this._i=0;\n    this._typer=setInterval(()=>{ this._i++; this.setState({bootIndex:this._i}); if(this._i>=full.length){clearInterval(this._typer);this._typer=null;} }, 110);\n    this._blink=setInterval(()=>this.setState(s=>({cursorOn:!s.cursorOn})), 540);\n    const wait=()=>{ if(window.opentype){ this.onLib(); } else { this._lib=setTimeout(wait,140); } };\n    wait();\n    this._oledF=0; this._oled=setInterval(()=>{ this._oledF++; this._drawOled(); }, 120); setTimeout(()=>this._drawOled(), 80);\n  }\n  componentWillUnmount(){ clearInterval(this._typer); clearInterval(this._blink); clearTimeout(this._lib); clearInterval(this._oled); }\n\n  _foxBits(){\n    if(this.__fox) return this.__fox;\n    const SS=128, N=32, cv=document.createElement('canvas'); cv.width=SS; cv.height=SS;\n    const g=cv.getContext('2d'); g.fillStyle='#000'; g.fillRect(0,0,SS,SS); const S=SS/100;\n    const P=s=>s.split(' ').map(p=>p.split(',').map(Number));\n    const poly=(pts,f)=>{ g.beginPath(); const a=P(pts); g.moveTo(a[0][0]*S,a[0][1]*S); for(let i=1;i<a.length;i++) g.lineTo(a[i][0]*S,a[i][1]*S); g.closePath(); g.fillStyle=f; g.fill(); };\n    poly('50,94 73,67 86,56 73,48 79,9 53,34 50,38 47,34 21,9 27,48 14,56 27,67','#fff');\n    const mm=P('25,61 33,33 50,54 67,33 75,61'); g.beginPath(); g.moveTo(mm[0][0]*S,mm[0][1]*S); for(let i=1;i<mm.length;i++) g.lineTo(mm[i][
